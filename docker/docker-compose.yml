# VPSI – Lokální vývojový stack
# Spuštění: docker compose up -d

services:
  db:
    image: postgres:18-alpine
    container_name: vpsi-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-vpsi}
      POSTGRES_USER: ${DB_USER:-vpsi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vpsi_dev}
    volumes:
      - vpsi-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vpsi}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: src/Vpsi.Api/Dockerfile
    container_name: vpsi-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-5001}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${DB_NAME:-vpsi};Username=${DB_USER:-vpsi};Password=${DB_PASSWORD:-vpsi_dev}"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: vpsi-frontend
    restart: unless-stopped
    ports:
      - "${FE_PORT:-5173}:80"
    depends_on:
      - api

  hw-simulator:
    build:
      context: ../hw-simulator
      dockerfile: src/HwSimulator.App/Dockerfile
    container_name: vpsi-hw-simulator
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8080
      SIMULATOR_SCENARIO: ${SIMULATOR_SCENARIO:-NormalFlow}
    depends_on:
      - api

volumes:
  vpsi-db-data:
